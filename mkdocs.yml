site_name: snix
site_description: Cross-platform SNI-spoofing DPI-bypass proxy.
site_url: https://snix.sh
repo_url: https://github.com/SamNet-dev/snix
repo_name: SamNet-dev/snix
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    # navigation.instant is removed because it conflicts with
    # mkdocs-static-i18n's language switcher under --strict.
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.action.edit
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: fa
          name: فارسی
          build: true
          site_name: snix
          nav_translations:
            Home: خانه
            Windows setup: راه‌اندازی ویندوز

nav:
  - Home: index.md
  - Windows setup: windows.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/SamNet-dev/snix
  alternate:
    - name: English
      link: /
      lang: en
    - name: فارسی
      link: /fa/
      lang: fa
