name: Feature request
description: Propose a new capability or change in behaviour.
title: "[feature] "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Not every feature belongs in core — some should be plugins, some
        should live in a separate repo. If you're unsure, open a GitHub
        Discussion first.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem does this solve? Who feels the pain?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Specific change you'd like to see. Be concrete — names, flags, UI.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: risks
    attributes:
      label: Risks / concerns
      description: Any correctness, performance, or user-experience pitfalls.
