name: Question
description: Ask how something works.
title: "[question] "
labels: [question]
body:
  - type: markdown
    attributes:
      value: |
        For installation + configuration questions, please check the
        README and docs first. GitHub Discussions is a better home for
        open-ended questions than Issues; consider posting there.
  - type: textarea
    id: question
    attributes:
      label: Question
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: What have you tried?
