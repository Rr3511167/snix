name: Bug report
description: Something is broken or behaves unexpectedly.
title: "[bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Before submitting,
        please make sure you can reproduce the issue on the latest release.
  - type: input
    id: version
    attributes:
      label: snix version
      description: Output of `snix --version`.
      placeholder: e.g. 0.5.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux (x86_64)
        - Linux (arm64)
        - Linux (armv7)
        - Windows 10
        - Windows 11
        - macOS
        - Other
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Exact command run
      description: The full invocation, including any flags.
      render: shell
      placeholder: sudo snix start -c /etc/snix/config.yaml
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output
      description: First 30 lines of stdout/stderr. Redact any personal info.
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else worth knowing — ISP, packet capture (redacted), tcpdump snippet.
