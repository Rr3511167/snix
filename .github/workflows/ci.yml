name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - run: go vet ./...
      - run: go test ./...
      # Race detector requires cgo; only run on Linux where gcc is
      # preinstalled on GitHub runners.
      - if: runner.os == 'Linux'
        run: go test -race -count=1 ./...

  cross-compile:
    name: cross-compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: build linux/amd64
        run: GOOS=linux GOARCH=amd64 go build -o /tmp/snix-linux-amd64 ./cmd/snix
      - name: build linux/arm64
        run: GOOS=linux GOARCH=arm64 go build -o /tmp/snix-linux-arm64 ./cmd/snix
      - name: build linux/armv7
        run: GOOS=linux GOARCH=arm GOARM=7 go build -o /tmp/snix-linux-armv7 ./cmd/snix
      - name: build windows/amd64
        run: GOOS=windows GOARCH=amd64 go build -o /tmp/snix-windows-amd64.exe ./cmd/snix
      - name: build darwin/amd64
        run: GOOS=darwin GOARCH=amd64 go build -o /tmp/snix-darwin-amd64 ./cmd/snix
      - name: build darwin/arm64
        run: GOOS=darwin GOARCH=arm64 go build -o /tmp/snix-darwin-arm64 ./cmd/snix
